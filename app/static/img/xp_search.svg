<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F0FE"/>
      <stop offset="100%" stop-color="#B0C8F0"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3168D5"/>
      <stop offset="100%" stop-color="#1A4AAA"/>
    </linearGradient>
  </defs>
  <!-- Magnifying glass -->
  <circle cx="14" cy="14" r="9" fill="url(#glass)" stroke="#3168D5" stroke-width="2"/>
  <circle cx="14" cy="14" r="7" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
  <!-- Handle -->
  <line x1="20.5" y1="20.5" x2="29" y2="29" stroke="url(#handle)" stroke-width="3.5" stroke-linecap="round"/>
</svg>