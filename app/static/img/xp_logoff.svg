<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="user" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2563A0"/>
    </linearGradient>
  </defs>
  <!-- Door frame -->
  <rect x="2" y="4" width="16" height="24" rx="2" fill="url(#user)" stroke="#1A4A80" stroke-width="0.5"/>
  <rect x="3" y="5" width="14" height="22" rx="1.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <!-- User silhouette -->
  <circle cx="10" cy="10" r="4" fill="white" opacity="0.7"/>
  <path d="M5,22 A6,6 0 0,1 15,22" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Arrow out -->
  <polygon points="22,8 28,16 22,24" fill="#3D9B3E" stroke="#2D7A30" stroke-width="0.5"/>
  <line x1="14" y1="16" x2="25" y2="16" stroke="#3D9B3E" stroke-width="2.5" stroke-linecap="round"/>
</svg>