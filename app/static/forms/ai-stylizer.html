<div style="font-family:'Segoe UI',Tahoma,sans-serif;background:#ece9d8;min-height:280px;display:flex;flex-direction:column">
  <div style="display:flex;gap:0;flex:1">
    <!-- Left sidebar -->
    <div style="width:180px;flex-shrink:0;background:#d6d0c4;border-right:1px solid #b7b09e;padding:12px;overflow-y:auto">
      <div style="font-size:11px;font-weight:bold;color:#6a5;margin-bottom:8px">Styles</div>
      <div class="stylist-opt selected" data-style="watercolor" onclick="SPick(this)" style="padding:6px 8px;margin-bottom:4px;border-radius:3px;cursor:pointer;font-size:12px;background:#f1efe6;border:1px solid #ccc;display:flex;align-items:center;gap:6px">
        <span>🎨</span><span>Watercolor</span>
      </div>
      <div class="stylist-opt" data-style="anime" onclick="SPick(this)" style="padding:6px 8px;margin-bottom:4px;border-radius:3px;cursor:pointer;font-size:12px;background:#f1efe6;border:1px solid #ccc;display:flex;align-items:center;gap:6px">
        <span>🌸</span><span>Anime</span>
      </div>
      <div class="stylist-opt" data-style="oilpainting" onclick="SPick(this)" style="padding:6px 8px;margin-bottom:4px;border-radius:3px;cursor:pointer;font-size:12px;background:#f1efe6;border:1px solid #ccc;display:flex;align-items:center;gap:6px">
        <span>🖼️</span><span>Oil Painting</span>
      </div>
      <div class="stylist-opt" data-style="pixelart" onclick="SPick(this)" style="padding:6px 8px;margin-bottom:4px;border-radius:3px;cursor:pointer;font-size:12px;background:#f1efe6;border:1px solid #ccc;display:flex;align-items:center;gap:6px">
        <span>🟦</span><span>Pixel Art</span>
      </div>
      <div class="stylist-opt" data-style="sketch" onclick="SPick(this)" style="padding:6px 8px;margin-bottom:4px;border-radius:3px;cursor:pointer;font-size:12px;background:#f1efe6;border:1px solid #ccc;display:flex;align-items:center;gap:6px">
        <span>✏️</span><span>Sketch</span>
      </div>
      <div class="stylist-opt" data-style="cinematic" onclick="SPick(this)" style="padding:6px 8px;margin-bottom:4px;border-radius:3px;cursor:pointer;font-size:12px;background:#f1efe6;border:1px solid #ccc;display:flex;align-items:center;gap:6px">
        <span>🎬</span><span>Cinematic</span>
      </div>
      <div style="margin-top:12px;padding-top:8px;border-top:1px solid #b7b09e">
        <div style="font-size:11px;font-weight:bold;color:#6a5;margin-bottom:6px">Upload</div>
        <div id="sz-drop" style="border:2px dashed #b7b09e;border-radius:4px;padding:16px 8px;text-align:center;cursor:pointer;position:relative;font-size:11px;color:#666">
          <div style="font-size:22px">📤</div>
          <div>Drop or click</div>
          <input type="file" id="sz-file" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer">
        </div>
      </div>
    </div>
    <!-- Right content -->
    <div style="flex:1;padding:12px;display:flex;flex-direction:column;overflow:hidden">
      <!-- Previews -->
      <div style="display:flex;gap:10px;flex:1;min-height:0">
        <div style="flex:1;display:flex;flex-direction:column;background:#fff;border:1px solid #b7b09e;border-radius:2px;overflow:hidden">
          <div style="background:#ece9d8;border-bottom:1px solid #b7b09e;padding:3px 8px;font-size:11px;font-weight:bold;color:#333">Original</div>
          <div id="sz-original" style="flex:1;display:flex;align-items:center;justify-content:center;min-height:120px;color:#bbb;font-size:12px;overflow:hidden">
            <img id="sz-orig-img" style="max-width:100%;max-height:100%;display:none">
            <span id="sz-orig-empty">📷 No image selected</span>
          </div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;background:#fff;border:1px solid #b7b09e;border-radius:2px;overflow:hidden">
          <div style="background:#ece9d8;border-bottom:1px solid #b7b09e;padding:3px 8px;font-size:11px;font-weight:bold;color:#333">Result</div>
          <div id="sz-result" style="flex:1;display:flex;align-items:center;justify-content:center;min-height:120px;color:#bbb;font-size:12px;overflow:hidden">
            <img id="sz-result-img" style="max-width:100%;max-height:100%;display:none">
            <span id="sz-result-empty">✨ Pick a style &amp; generate</span>
          </div>
        </div>
      </div>
      <!-- Status -->
      <div id="sz-status" style="margin-top:8px;display:none;padding:6px 10px;font-size:11px;border-radius:3px"></div>
      <!-- Button -->
      <button id="sz-gen-btn" onclick="SGenerate()" disabled
        style="margin-top:8px;padding:6px 12px;background:linear-gradient(180deg,#fff,#ece9d8);border:1px solid #999;border-radius:3px;font-size:12px;cursor:pointer;color:#333;font-weight:bold;box-shadow:0 1px 0 rgba(255,255,255,.8) inset">
        Generate
      </button>
    </div>
  </div>
</div>
<style>
.stylist-opt.selected{border-color:#6a4 !important;background:#d8e8c8 !important;color:#030}
.stylist-opt:hover{border-color:#999;background:#f8f5ee}
#sz-drop.dragover{border-color:#6a4;background:#e8f0d8}
#sz-gen-btn:disabled{opacity:.5;cursor:default}
</style>
<script src="/static/js/ai-stylizer.js"></script>
