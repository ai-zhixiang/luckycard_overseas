<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Card — Professional Edition</title>
    <meta name="description" content="Create beautiful AI-powered greeting cards. Send luck across the world.">
    <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
    <link rel="stylesheet" href="/static/css/xp.css?v=3">
    <link rel="stylesheet" href="/static/css/bios.css?v=10">
</head>
<body class="xp-desktop">

    <!-- Boot Screen -->
    <script src="/static/js/bios.js?v=20"></script>

    <!-- Bliss Wallpaper -->
    <div class="xp-wallpaper"></div>

    <!-- Desktop Icons -->
    <div class="xp-desktop-icons">
        <div class="xp-icon" ondblclick="XPShell.openWindow('create','Create Card','🃏','<p>Card creator coming soon.</p>')">
            <div class="xp-icon-img">🃏</div>
            <span>Create Card</span>
        </div>
        <div class="xp-icon" ondblclick="XPShell.openWindow('gallery','Gallery','🖼️','<p>Gallery coming soon.</p>')">
            <div class="xp-icon-img">🖼️</div>
            <span>Gallery</span>
        </div>
        <div class="xp-icon" ondblclick="XPShell.openWindow('mycards','My Cards','📁','<p>Your cards will appear here.</p>')">
            <div class="xp-icon-img">📁</div>
            <span>My Cards</span>
        </div>
        <div class="xp-icon" ondblclick="XPShell.openWindow('music','Music','🎵','<p>Music library coming soon.</p>')">
            <div class="xp-icon-img">🎵</div>
            <span>Music</span>
        </div>
        <div class="xp-icon" style="margin-top:20px">
            <div class="xp-icon-img">🗑️</div>
            <span>Recycle Bin</span>
        </div>
    </div>

    <!-- Windows Container -->
    <div id="xp-windows"></div>

    <!-- Start Menu -->
    <div id="xp-start-menu" class="xp-start-menu">
        <div class="xp-start-header">
            <div class="xp-start-avatar"><img src="/static/img/logo.svg" style="width:32px;height:32px;"></div>
            <div class="xp-start-user">Lucky Card User</div>
        </div>
        <div class="xp-start-body">
            <div class="xp-start-programs">
                <button class="xp-start-item" onclick="XPShell.openWindow('create','Create Card','🃏','<p>Card creator coming soon.</p>');XPShell.toggleStart()">
                    <span class="si-icon">🃏</span><span class="si-label">Create Card</span>
                </button>
                <button class="xp-start-item" onclick="XPShell.openWindow('gallery','Gallery','🖼️','<p>Gallery coming soon.</p>');XPShell.toggleStart()">
                    <span class="si-icon">🖼️</span><span class="si-label">Gallery</span>
                </button>
                <button class="xp-start-item" onclick="XPShell.openWindow('music','Music','🎵','<p>Music library coming soon.</p>');XPShell.toggleStart()">
                    <span class="si-icon">🎵</span><span class="si-label">Music</span>
                </button>
                <button class="xp-start-item">
                    <span class="si-icon">📋</span><span class="si-label">Templates</span>
                </button>
                <div style="border-top:1px solid #D0D0D0;margin:4px 0"></div>
                <button class="xp-start-item">
                    <span class="si-icon">🃏</span><span class="si-label">All Programs</span>
                </button>
            </div>
            <div class="xp-start-system">
                <button class="xp-start-item">
                    <span class="si-icon">📁</span><span class="si-label">My Documents</span>
                </button>
                <button class="xp-start-item">
                    <span class="si-icon">🖼️</span><span class="si-label">My Pictures</span>
                </button>
                <button class="xp-start-item">
                    <span class="si-icon">🎵</span><span class="si-label">My Music</span>
                </button>
                <div style="border-top:1px solid #B6C8D8;margin:4px 0"></div>
                <button class="xp-start-item">
                    <span class="si-icon">⚙️</span><span class="si-label">Control Panel</span>
                </button>
                <button class="xp-start-item">
                    <span class="si-icon">🔍</span><span class="si-label">Search</span>
                </button>
                <button class="xp-start-item">
                    <span class="si-icon">❓</span><span class="si-label">Help & Support</span>
                </button>
            </div>
        </div>
        <div class="xp-start-footer">
            <button >🔒 Log Off</button>
            <div class="sf-divider"></div>
            <button >⏻ Shut Down</button>
        </div>
    </div>

    <!-- Taskbar -->
    <div class="xp-taskbar">
        <button id="xp-start-btn" ><img src="/static/img/logo.svg" style="width:20px;height:20px;margin-right:4px;vertical-align:middle;">Start</button>
        <div class="xp-taskbar-divider"></div>
        <div class="xp-taskbar-tasks" id="xp-taskbar-tasks"></div>
        <div class="xp-tray">
            <span>🔊</span>
            <span id="xp-clock">00:00</span>
        </div>
    </div>

    <script src="/static/js/xp.js?v=6"></script>
</body>
</html>
